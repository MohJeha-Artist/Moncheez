<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moncheez – Social Links</title>
  <meta name="description" content="Connect with Moncheez on all social media platforms." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #b47cff;
      --accent2: #ff6fd8;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.18);
      --text: #ffffff;
      --subtext: rgba(255,255,255,0.65);
      --shadow: 0 8px 32px rgba(0,0,0,0.45);
      --fb: #1877f2;
      --ig-from: #f09433; --ig-to: #bc1888;
      --tt: #010101;
      --wa: #25d366;
    }

    html, body {
      min-height: 100%;
      background: #0f0f14;
      font-family: 'Outfit', sans-serif;
    }

    /* ─── Full-page wrapper ──────────────────────────────── */
    .card-wrap {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ─── Background Layer ─────────────────────────────── */
    .bg-layer {
      position: absolute; inset: 0;
      background: linear-gradient(145deg, #1a0533 0%, #0d1b4b 60%, #0a0f1a 100%);
      background-image: url('https://i.ibb.co/zTnk5s5j/background.webp');
      background-size: cover;
      background-position: center;
      transition: background 0.5s ease;
      z-index: 0;
    }
    .bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.15) 40%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* ─── Animated glow orbs ───────────────────────────── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.35;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
      z-index: 1;
    }
    .orb1 { width: 220px; height: 220px; background: #7b2ff7; top: -60px; left: -60px; animation-duration: 9s; }
    .orb2 { width: 180px; height: 180px; background: #ff2d87; bottom: 60px; right: -50px; animation-duration: 11s; }
    .orb3 { width: 140px; height: 140px; background: #00c9ff; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-duration: 7s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(20px, 20px) scale(1.08); }
    }

    /* ─── Content ──────────────────────────────────────── */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 64px 28px 48px;
      gap: 0;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── Hero Logo ──────────────────────────────────── */
    .hero-logo {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 44px;
      animation: fadeInDown 0.6s ease both;
    }
    .hero-logo img {
      width: 90%;
      max-width: 720px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Chips Image ────────────────────────────────── */
    .chips-img {
      position: relative;
      z-index: 2;
      width: 100%;
      display: block;
      margin-top: 56px;
      animation: fadeInUp 0.7s ease 0.3s both;
    }
    .chips-img img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Copyright Footer ──────────────────────────────── */
    .copyright {
      position: relative;
      z-index: 2;
      width: 100%;
      text-align: center;
      padding: 20px 24px 28px;
      font-size: 0.72rem;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .copyright a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .copyright a:hover { color: rgba(255,255,255,0.85); }

    .name {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
      text-align: center;
    }

    .bio {
      font-size: 0.8rem;
      color: var(--subtext);
      font-weight: 300;
      margin-top: 5px;
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: 0.03em;
    }

    /* ─── Divider ──────────────────────────────────────── */
    .divider {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    /* ─── Social Buttons ───────────────────────────────── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition:
        transform 0.22s cubic-bezier(.34,1.56,.64,1),
        box-shadow 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.22s ease;
      border-radius: inherit;
    }

    .link-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: scale(0.97); }

    /* Per-platform colours */
    .btn-fb::before  { background: rgba(24, 119, 242, 0.25); }
    .btn-fb:hover    { border-color: rgba(24,119,242,0.6); box-shadow: 0 12px 30px rgba(24,119,242,0.35); }

    .btn-ig::before  { background: linear-gradient(135deg, rgba(240,148,51,0.2), rgba(188,24,136,0.2)); }
    .btn-ig:hover    { border-color: rgba(240,100,100,0.55); box-shadow: 0 12px 30px rgba(200,60,150,0.35); }

    .btn-tt::before  { background: rgba(255,255,255,0.06); }
    .btn-tt:hover    { border-color: rgba(255,255,255,0.4); box-shadow: 0 12px 30px rgba(255,255,255,0.15); }

    .btn-wa::before  { background: rgba(37, 211, 102, 0.2); }
    .btn-wa:hover    { border-color: rgba(37,211,102,0.55); box-shadow: 0 12px 30px rgba(37,211,102,0.35); }

    /* Icon wrapper */
    .icon-wrap {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap svg { width: 22px; height: 22px; fill: #fff; }

    .btn-fb  .icon-wrap { background: var(--fb); }
    .btn-ig  .icon-wrap { background: linear-gradient(135deg, var(--ig-from), var(--ig-to)); }
    .btn-tt  .icon-wrap { background: #010101; box-shadow: 0 0 0 1px rgba(255,255,255,0.2); }
    .btn-wa  .icon-wrap { background: var(--wa); }

    .link-label { flex: 1; }
    .link-arrow {
      opacity: 0.5;
      font-size: 1rem;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .link-btn:hover .link-arrow { transform: translateX(4px); opacity: 1; }

    /* ─── Footer ───────────────────────────────────────── */
    .footer {
      margin-top: 24px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ─── Background Upload UI ─────────────────────────── */
    .upload-fab {
      position: absolute;
      top: 14px; right: 14px;
      z-index: 10;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .upload-fab:hover { background: rgba(255,255,255,0.22); transform: scale(1.1); }
    .upload-fab svg { width: 18px; height: 18px; fill: #fff; }

    .upload-panel {
      position: absolute;
      top: 60px; right: 14px;
      z-index: 10;
      background: rgba(20, 20, 35, 0.88);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 16px;
      width: 200px;
      display: none;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
      animation: slideDown 0.2s ease;
    }
    .upload-panel.open { display: flex; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .upload-panel label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .upload-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px dashed rgba(255,255,255,0.25);
      border-radius: 10px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .upload-btn:hover { background: rgba(255,255,255,0.14); }
    .upload-btn svg { width: 16px; height: 16px; fill: var(--accent); flex-shrink: 0; }

    #bg-file-input { display: none; }

    .reset-btn {
      padding: 8px 12px;
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.25);
      border-radius: 10px;
      color: rgba(255,120,120,0.9);
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
      text-align: center;
    }
    .reset-btn:hover { background: rgba(255,80,80,0.22); }


  </style>
</head>
<body>

<div class="card-wrap" id="card">
  <!-- Background -->
  <div class="bg-layer" id="bgLayer"></div>

  <!-- Ambient orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Main Content -->
  <div class="content">
    <div class="hero-logo"><img src="https://i.ibb.co/6cJLZVj7/Logo.webp" alt="Moncheez Logo" /></div>

    <div class="links">
      <!-- Facebook -->
      <a class="link-btn btn-fb" href="https://facebook.com/" target="_blank" rel="noopener" id="link-facebook">
        <span class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.404 18.629 0 12 0S0 5.404 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.514c-1.491 0-1.956.93-1.956 1.884v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
        </span>
        <span class="link-label">Facebook</span>
        <span class="link-arrow">›</span>
      </a>

      <!-- Instagram -->
      <a class="link-btn btn-ig" href="https://instagram.com/" target="_blank" rel="noopener" id="link-instagram">
        <span class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        </span>
        <span class="link-label">Instagram</span>
        <span class="link-arrow">›</span>
      </a>

      <!-- TikTok -->
      <a class="link-btn btn-tt" href="https://tiktok.com/" target="_blank" rel="noopener" id="link-tiktok">
        <span class="icon-wrap">
          <svg viewBox="0 0 24 24"><path fill="#fff" d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.73a8.17 8.17 0 0 0 4.79 1.52V6.79a4.85 4.85 0 0 1-1.02-.1z"/></svg>
        </span>
        <span class="link-label">TikTok</span>
        <span class="link-arrow">›</span>
      </a>

      <!-- WhatsApp -->
      <a class="link-btn btn-wa" href="https://wa.me/" target="_blank" rel="noopener" id="link-whatsapp">
        <span class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
        </span>
        <span class="link-label">WhatsApp</span>
        <span class="link-arrow">›</span>
      </a>
    </div>
  </div>

  <div class="chips-img"><img src="https://i.ibb.co/8nbTHmzB/Chips.webp" alt="Moncheez Chips" /></div>

  <footer class="copyright">
    &copy; 2025 Moncheez. All rights reserved.
  </footer>

</div>

<script>
  const uploadFab   = document.getElementById('uploadFab');
  const uploadPanel = document.getElementById('uploadPanel');
  const chooseBtn   = document.getElementById('chooseImgBtn');
  const fileInput   = document.getElementById('bg-file-input');
  const resetBtn    = document.getElementById('resetBgBtn');
  const bgLayer     = document.getElementById('bgLayer');

  // Toggle panel
  uploadFab.addEventListener('click', (e) => {
    e.stopPropagation();
    uploadPanel.classList.toggle('open');
  });

  // Close panel on outside click
  document.addEventListener('click', (e) => {
    if (!uploadPanel.contains(e.target) && e.target !== uploadFab) {
      uploadPanel.classList.remove('open');
    }
  });

  // Trigger file input
  chooseBtn.addEventListener('click', () => fileInput.click());

  // Handle file selection
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      bgLayer.style.backgroundImage = `url('${ev.target.result}')`;
      bgLayer.style.backgroundSize  = 'cover';
      bgLayer.style.backgroundPosition = 'center';
      uploadPanel.classList.remove('open');
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  // Reset background to default
  const DEFAULT_BG = "url('assets/background.webp')";
  resetBtn.addEventListener('click', () => {
    bgLayer.style.backgroundImage = DEFAULT_BG;
    bgLayer.style.backgroundSize  = 'cover';
    bgLayer.style.backgroundPosition = 'center';
    uploadPanel.classList.remove('open');
  });

  // Drag & Drop onto card
  const card = document.getElementById('card');
  card.addEventListener('dragover', (e) => { e.preventDefault(); card.style.outline = '2px dashed rgba(180,124,255,0.7)'; });
  card.addEventListener('dragleave', ()  => { card.style.outline = ''; });
  card.addEventListener('drop', (e) => {
    e.preventDefault();
    card.style.outline = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        bgLayer.style.backgroundImage = `url('${ev.target.result}')`;
        bgLayer.style.backgroundSize  = 'cover';
        bgLayer.style.backgroundPosition = 'center';
      };
      reader.readAsDataURL(file);
    }
  });
</script>
</body>
</html>
